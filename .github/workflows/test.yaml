name: Unit tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check linter
        run: pnpm lint:check

      - name: Build core
        working-directory: packages/core
        run: pnpm build

      - name: Build rest
        run: pnpm --filter compile --filter viewer run build

      - name: Validate viewer types (svelte-check)
        run: pnpm --filter viewer run validate

      - name: Run all tests
        run: pnpm --recursive run test:cov
