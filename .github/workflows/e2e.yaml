name: End-to-end tests

on:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    container: cypress/browsers:node-22.16.0-chrome-137.0.7151.68-1-ff-139.0.1-edge-137.0.3296.62-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - uses: actions/cache@v4
        name: Setup Cypress cache
        with:
          # Must match the container's CYPRESS_CACHE_FOLDER (/root/.cache/Cypress);
          # the binary is looked up there at runtime.
          path: /root/.cache/Cypress
          key: ${{ runner.os }}-cypress-v3-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cypress-v3-

      # pnpm records build-script state in the (cached) store, so on a warm
      # store it skips cypress's postinstall and the binary is never fetched
      # into this container. Install it explicitly to be deterministic.
      - name: Install Cypress binary
        run: pnpm --filter viewer exec cypress install

      - name: Build core
        working-directory: packages/core
        run: pnpm build

      - name: Build viewer
        working-directory: packages/viewer
        run: |
          VITE_BUNDLE_HOST=http://localhost:4173 pnpm run build

      - name: Copy fixtures
        working-directory: packages/viewer
        # The viewer build is configured to load data from the local server's
        # static assets, so we populate the main branch location with fixture
        # data, for deterministic testing.
        run: |
          mkdir -p dist/refs/heads
          cp cypress/fixtures/main.min.json dist/refs/heads/main.json

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          build: echo "Start runs build"
          command: pnpm --filter viewer run cy:run --config baseUrl=http://localhost:4173
          start: pnpm --filter viewer run preview
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
